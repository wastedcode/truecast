version: 2
updates:
  # npm (pnpm lockfile) — keep dependencies patched. Dev-dep bumps are grouped into one PR to cut noise;
  # production deps come as individual PRs so each is reviewed on its own.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # GitHub Actions — keeps workflow actions current (e.g. the Node 20 → newer runtime deprecation).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
